<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Level Editor</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #1a1a1a;
}

/* GRID */
.grid {
  position: absolute;
  width: 100%;
  height: 100%;
  background-image: linear-gradient(#222 1px, transparent 1px),
                    linear-gradient(90deg, #222 1px, transparent 1px);
  background-size: 40px 40px;
}

/* OBJEKTE */
.obj {
  position: absolute;
  width: 40px;
  height: 40px;
  opacity: 0.5;
}

/* UI BAR */
#bar {
  position: absolute;
  bottom: 0;
  width: 100%;
  height: 80px;
  background: #000;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px;
}

.item {
  width: 60px;
  height: 60px;
  cursor: pointer;
  border: 2px solid white;
  opacity: 0.7;
}

.item:hover {
  opacity: 1;
}

.selected {
  border: 2px solid #00ff88;
}

/* FINISH */
#finish {
  position: absolute;
  right: 10px;
  bottom: 10px;
  padding: 15px 20px;
  background: #00ff88;
  cursor: pointer;
  font-weight: bold;
}
</style>
</head>

<body>

<div class="grid" id="grid"></div>

<!-- TOOLBAR -->
<div id="bar">

  <div class="item selected" data-type="block" style="background:#888"></div>
  <div class="item" data-type="spike" style="background:red; clip-path: polygon(50% 0%, 0% 100%, 100% 100%);"></div>
  <div class="item" data-type="jumppad" style="background:yellow;"></div>
  <div class="item" data-type="start" style="background:lime;"></div>
  <div class="item" data-type="end" style="background:blue;"></div>

</div>

<div id="finish">Fertig</div>

<script>

let selected = "block";
let objects = [];

const grid = document.getElementById("grid");

// TOOL SELECTION
document.querySelectorAll(".item").forEach(i=>{
  i.onclick = () => {
    document.querySelectorAll(".item").forEach(x=>x.classList.remove("selected"));
    i.classList.add("selected");
    selected = i.dataset.type;
  };
});

// PLACE OBJECTS
document.addEventListener("click", (e)=>{
  if(e.target.id === "finish" || e.target.classList.contains("item")) return;

  let x = Math.floor(e.clientX / 40) * 40;
  let y = Math.floor(e.clientY / 40) * 40;

  let obj = {x,y,type:selected};
  objects.push(obj);

  draw();
});

// DRAW
function draw(){
  document.querySelectorAll(".obj").forEach(o=>o.remove());

  objects.forEach(o=>{
    let div = document.createElement("div");
    div.className = "obj";
    div.style.left = o.x + "px";
    div.style.top = o.y + "px";

    if(o.type==="block") div.style.background="#777";
    if(o.type==="spike") {
      div.style.background="red";
      div.style.clipPath="polygon(50% 0%,0% 100%,100% 100%)";
    }
    if(o.type==="jumppad") div.style.background="yellow";
    if(o.type==="start") div.style.background="lime";
    if(o.type==="end") div.style.background="blue";

    document.body.appendChild(div);
  });
}

// SAVE + EXIT
document.getElementById("finish").onclick = () => {
  localStorage.setItem("level1", JSON.stringify(objects));
  window.location.href = "index.html";
};

</script>

</body>
</html>
