<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Game Start</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #1e1e1e;
}

canvas {
  display: block;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// 🔥 LEVEL DATEN (werden später aus 1.html geladen)
let level = [
  { x: 400, w: 40, h: 60 },
  { x: 700, w: 40, h: 60 },
  { x: 1100, w: 40, h: 60 }
];

let player = {
  x: 100,
  y: 200,
  w: 40,
  h: 40,
  vy: 0,
  g: 0.8,
  jump: -14,
  grounded: false
};

function jump(){
  if(player.grounded){
    player.vy = player.jump;
    player.grounded = false;
  }
}

document.addEventListener("keydown", e=>{
  if(e.code==="Space") jump();
});
document.addEventListener("click", jump);

function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // ground
  ctx.fillStyle="#00aa00";
  ctx.fillRect(0,canvas.height-20,canvas.width,20);

  // player physics
  player.vy += player.g;
  player.y += player.vy;

  if(player.y + player.h >= canvas.height-20){
    player.y = canvas.height-20-player.h;
    player.vy = 0;
    player.grounded = true;
  }

  // player
  ctx.fillStyle="#00ff88";
  ctx.fillRect(player.x,player.y,player.w,player.h);

  // obstacles from level
  for(let o of level){
    o.x -= 6;

    ctx.fillStyle="red";
    ctx.fillRect(o.x, canvas.height-80, o.w, o.h);

    // collision
    if(
      player.x < o.x + o.w &&
      player.x + player.w > o.x &&
      player.y < canvas.height-80 + o.h &&
      player.y + player.h > canvas.height-80
    ){
      alert("Game Over!");
      location.reload();
    }
  }

  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
