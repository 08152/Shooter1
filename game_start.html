<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Game</title>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #111;
}

canvas {
  display: block;
}
</style>
</head>

<body>

<canvas id="c"></canvas>

<script>

const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// LOAD LEVEL
let level = JSON.parse(localStorage.getItem("level1") || "[]");

let player = {x:100,y:100,w:40,h:40,vy:0,g:0.8,jump:-14,grounded:false};

function jump(){
  if(player.grounded){
    player.vy = player.jump;
    player.grounded = false;
  }
}

document.addEventListener("keydown",e=>{if(e.code==="Space")jump();});
document.addEventListener("click",jump);

function loop(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // PLAYER
  player.vy += player.g;
  player.y += player.vy;

  if(player.y+player.h>=canvas.height-20){
    player.y=canvas.height-20-player.h;
    player.vy=0;
    player.grounded=true;
  }

  ctx.fillStyle="lime";
  ctx.fillRect(player.x,player.y,player.w,player.h);

  // OBJECTS
  for(let o of level){

    if(o.type==="block"){
      ctx.fillStyle="#777";
      ctx.fillRect(o.x,o.y,40,40);
    }

    if(o.type==="spike"){
      ctx.fillStyle="red";
      ctx.fillRect(o.x,o.y,40,40);
    }

    if(o.type==="jumppad"){
      ctx.fillStyle="yellow";
      ctx.fillRect(o.x,o.y,40,10);
    }

    if(o.type==="end"){
      ctx.fillStyle="blue";
      ctx.fillRect(o.x,o.y,40,40);

      if(player.x < o.x+40 && player.x+player.w > o.x){
        alert("LEVEL COMPLETE!");
      }
    }

    // COLLISION BLOCKS
    if(o.type==="block"){
      if(
        player.x < o.x+40 &&
        player.x+player.w > o.x &&
        player.y < o.y+40 &&
        player.y+player.h > o.y
      ){
        location.reload();
      }
    }

    // SPIKES
    if(o.type==="spike"){
      if(
        player.x < o.x+40 &&
        player.x+player.w > o.x &&
        player.y < o.y+40 &&
        player.y+player.h > o.y
      ){
        location.reload();
      }
    }
  }

  requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
