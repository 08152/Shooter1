<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FPS GLB OPTIMIZED</title>

<style>
body { margin:0; overflow:hidden; background:#87cfff; }

#crosshair{
  position:absolute;
  top:50%;
  left:50%;
  width:10px;height:10px;
  transform:translate(-50%,-50%);
}
#crosshair:before,#crosshair:after{
  content:"";
  position:absolute;
  background:white;
}
#crosshair:before{width:2px;height:10px;left:4px;}
#crosshair:after{width:10px;height:2px;top:4px;}

#hud{
  position:absolute;
  bottom:10px;
  left:10px;
  color:white;
  font-family:Arial;
  background:rgba(0,0,0,0.4);
  padding:6px;
}
</style>
</head>

<body>

<div id="crosshair"></div>
<div id="hud">FPS WORLD (OPTIMIZED)</div>

<!-- THREE -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

// ================= SCENE =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87cfff);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 5000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff, 1.2));
const sun = new THREE.DirectionalLight(0xffffff, 1.2);
sun.position.set(20,40,10);
scene.add(sun);

// ================= PLAYER =================
const player = new THREE.Object3D();
scene.add(player);
player.add(camera);
camera.position.set(0,2,0);

// ================= INPUT =================
const keys = {};
addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

// mouse look
let yaw=0,pitch=0;

document.addEventListener("mousemove",(e)=>{
if(document.pointerLockElement!==document.body) return;

yaw -= e.movementX*0.002;
pitch -= e.movementY*0.002;

pitch = Math.max(-1.2,Math.min(1.2,pitch));

player.rotation.y = yaw;
camera.rotation.x = pitch;
});

document.body.addEventListener("click",()=>document.body.requestPointerLock());

// ================= PHYSICS =================
let velY = 0;
let onGround = true;

// ================= GLB CACHE SYSTEM =================
const loader = new THREE.GLTFLoader();

let treeModel = null;
let ready = false;
let queue = [];

loader.load("./baum.glb",(gltf)=>{

treeModel = gltf.scene;
ready = true;

// queued trees
queue.forEach(t=>{
spawnTree(t.x,t.y,t.z);
});
queue = [];

});

// ================= TREE SPAWN (NO RELOAD) =================
function spawnTree(x,y,z){

if(!ready){
queue.push({x,y,z});
return;
}

const tree = treeModel.clone(); // 🔥 CACHE COPY

tree.position.set(x,y,z);
tree.scale.set(1,1,1);

scene.add(tree);
}

// ================= WORLD GENERATION =================
for(let i=0;i<200;i++){
spawnTree(
(Math.random()-0.5)*200,
-1,
(Math.random()-0.5)*200
);
}

// ================= MOVE =================
function move(){
const speed = 0.25;

let dir = new THREE.Vector3();
if(keys["w"]) dir.z -= 1;
if(keys["s"]) dir.z += 1;
if(keys["a"]) dir.x -= 1;
if(keys["d"]) dir.x += 1;

dir.normalize();

const forward = new THREE.Vector3(0,0,-1).applyEuler(player.rotation);
forward.y = 0;
forward.normalize();

const right = new THREE.Vector3().crossVectors(forward,new THREE.Vector3(0,1,0)).negate();

player.position.addScaledVector(forward,dir.z*speed);
player.position.addScaledVector(right,dir.x*speed);
}

// ================= GRAVITY =================
function gravity(){
velY -= 0.02;
player.position.y += velY;

if(player.position.y < 0){
player.position.y = 0;
velY = 0;
onGround = true;
}
}

addEventListener("keydown",(e)=>{
if(e.code==="Space" && onGround){
velY = 0.3;
onGround = false;
}
});

// ================= LOOP =================
function animate(){
requestAnimationFrame(animate);

move();
gravity();

camera.position.y += (2 + player.position.y - camera.position.y)*0.15;

renderer.render(scene,camera);
}

animate();

// resize
addEventListener("resize",()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

</script>
</body>
</html>
