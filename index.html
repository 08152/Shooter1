<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D FPS Chunk Game</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        /* Fadenkreuz in der Bildschirmmitte */
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            transform: translate(-50%, -50%);
            z-index: 10;
            pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background-color: rgba(255, 255, 255, 0.8);
        }
        #crosshair::before {
            top: 4px;
            left: 0;
            width: 10px;
            height: 2px;
        }
        #crosshair::after {
            top: 0;
            left: 4px;
            width: 2px;
            height: 10px;
        }
        /* UI Overlays oben links */
        #ui-container {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 10;
            color: #ffffff;
            font-family: monospace;
            font-size: 14px;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 12px;
            border-radius: 5px;
            pointer-events: none;
            line-height: 1.5;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        /* Start- und Pause-Bildschirm */
        #blocker {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            top: 0;
            left: 0;
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        #instructions {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            text-align: center;
            padding: 20px;
        }
        #instructions h1 {
            font-size: 40px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #instructions p {
            font-size: 18px;
            margin: 8px 0;
            color: #cccccc;
        }
        .controls-list {
            margin-top: 20px;
            background: rgba(255,255,255,0.1);
            padding: 15px 25px;
            border-radius: 8px;
            text-align: left;
        }
        /* Asset-Ladebildschirm */
        #loading-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #111111;
            top: 0;
            left: 0;
            z-index: 30;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: #3498db;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #loading-text {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
    <!-- Import Maps für moderne, saubere Three.js ES-Modul-Imports via CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com",
                "three/addons/": "https://unpkg.com"
            }
        }
    </script>
</head>
<body>
    <!-- Ladeanzeige für 3D-Modelle -->
    <div id="loading-screen">
        <div class="spinner"></div>
        <div id="loading-text">3D-Modelle werden geladen...</div>
    </div>

    <!-- Start/Pause Sperrbildschirm für Pointer Lock -->
    <div id="blocker">
        <div id="instructions">
            <h1>Klicken zum Spielen</h1>
            <div class="controls-list">
                <p><strong>W, A, S, D</strong> - Bewegen</p>
                <p><strong>LEERTASTE</strong> - Springen</p>
                <p><strong>MAUS</strong> - Umsehen</p>
            </div>
            <p style="margin-top: 25px; font-size: 14px; color: #888;">Drücke ESC zum Pausieren</p>
        </div>
    </div>

    <!-- Fadenkreuz -->
    <div id="crosshair"></div>

    <!-- UI Overlay für Telemetriedaten -->
    <div id="ui-container">
        <div>FPS: <span id="fps-val">0</span></div>
        <div>X: <span id="pos-x">0.0</span></div>
        <div>Y: <span id="pos-y">0.0</span></div>
        <div>Z: <span id="pos-z">0.0</span></div>
        <div>Aktiver Chunk: <span id="chunk-val">0,0</span></div>
        <div>Geladene Chunks: <span id="loaded-chunks-val">0</span></div>
    </div>

    <!-- Container für das WebGL Canvas -->
    <div id="canvas-container"></div>

    <!-- Hauptspielskript laden -->
    <script type="module" src="game.js"></script>
</body>
</html>
