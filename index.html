<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D FPS Chunk Game</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #canvas-container {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }
        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            transform: translate(-50%, -50%);
            z-index: 10;
            pointer-events: none;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background-color: rgba(255, 255, 255, 0.8);
        }
        #crosshair::before {
            top: 4px;
            left: 0;
            width: 10px;
            height: 2px;
        }
        #crosshair::after {
            top: 0;
            left: 4px;
            width: 2px;
            height: 10px;
        }
        #ui-container {
            position: absolute;
            top: 15px;
            left: 15px;
            z-index: 10;
            color: #ffffff;
            font-family: monospace;
            font-size: 14px;
            background-color: rgba(0, 0, 0, 0.5);
            padding: 12px;
            border-radius: 5px;
            pointer-events: none;
            line-height: 1.5;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        #blocker {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.7);
            top: 0;
            left: 0;
            z-index: 20;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
        }
        #instructions {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            text-align: center;
            padding: 20px;
        }
        #instructions h1 {
            font-size: 40px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        #instructions p {
            font-size: 18px;
            margin: 8px 0;
            color: #cccccc;
        }
        .controls-list {
            margin-top: 20px;
            background: rgba(255,255,255,0.1);
            padding: 15px 25px;
            border-radius: 8px;
            text-align: left;
        }
        #loading-screen {
            position: absolute;
            width: 100%;
            height: 100%;
            background-color: #111111;
            top: 0;
            left: 0;
            z-index: 30;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            transition: opacity 0.5s ease;
        }
        .spinner {
            width: 50px;
            height: 50px;
            border: 5px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top-color: #3498db;
            animation: spin 1s ease-in-out infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        #loading-text {
            margin-top: 20px;
            font-size: 18px;
            font-weight: bold;
        }
    </style>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com",
                "three/addons/": "https://unpkg.com"
            }
        }
    </script>
</head>
<body>
    <div id="loading-screen">
        <div class="spinner"></div>
        <div id="loading-text">3D-Modelle werden geladen...</div>
    </div>

    <div id="blocker">
        <div id="instructions">
            <h1>Klicken zum Spielen</h1>
            <div class="controls-list">
                <p><strong>W, A, S, D</strong> - Bewegen</p>
                <p><strong>LEERTASTE</strong> - Springen</p>
                <p><strong>MAUS</strong> - Umsehen</p>
            </div>
            <p style="margin-top: 25px; font-size: 14px; color: #888;">Drücke ESC zum Pausieren</p>
        </div>
    </div>

    <div id="crosshair"></div>

    <div id="ui-container">
        <div>FPS: <span id="fps-val">0</span></div>
        <div>X: <span id="pos-x">0.0</span></div>
        <div>Y: <span id="pos-y">0.0</span></div>
        <div>Z: <span id="pos-z">0.0</span></div>
        <div>Aktiver Chunk: <span id="chunk-val">0,0</span></div>
        <div>Geladene Chunks: <span id="loaded-chunks-val">0</span></div>
    </div>

    <div id="canvas-container"></div>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        // ==========================================
        // KONFIGURATION & GLOBALE VARIABLEN
        // ==========================================
        const WORLD_SIZE = 10000; 
        const HALF_WORLD_SIZE = WORLD_SIZE / 2;
        const CHUNK_SIZE = 100;    
        const RENDER_DISTANCE = 3; 

        let scene, camera, renderer, clock;
        let currentChunkX = null;
        let currentChunkZ = null;

        const loadedChunks = new Map(); 
        const chunkSeeds = new Map();  

        // Loader-Instanz und dein gewünschtes Collidables-Array
        const gltfLoader = new GLTFLoader();
        let collidables = [];

        // Interner Arbeitsspeicher-Cache für geladene Master-Modelle
        const modelCache = {};

        // Spieler-Konfiguration
        const player = {
            height: 1.8,
            radius: 0.6,
            velocity: new THREE.Vector3(),
            direction: new THREE.Vector3(),
            speed: 30.0,
            jumpStrength: 12.0,
            canJump: false,
            g: 32.0 
        };

        const keys = { w: false, a: false, s: false, d: false };

        const ui = {
            fps: document.getElementById('fps-val'),
            posX: document.getElementById('pos-x'),
            posY: document.getElementById('pos-y'),
            posZ: document.getElementById('pos-z'),
            chunk: document.getElementById('chunk-val'),
            loadedChunks: document.getElementById('loaded-chunks-val'),
            loadingScreen: document.getElementById('loading-screen'),
            blocker: document.getElementById('blocker')
        };

        let fpsFrameCount = 0;
        let fpsLastTime = 0;

        // ==========================================
        // INITIALISIERUNG
        // ==========================================
        function init() {
            clock = new THREE.Clock();

            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x7ec0ee); 
            scene.fog = new THREE.FogExp2(0x7ec0ee, 0.005);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, player.height, 0);

            renderer = new THREE.WebGLRenderer({ 
                antialias: false, 
                powerPreference: "high-performance",
                precision: "mediump" 
            });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); 
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap; 
            
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            // Lichtquellen
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xffffff, 0.8);
            sunLight.position.set(100, 200, 50);
            sunLight.castShadow = true;
            sunLight.shadow.mapSize.width = 1024;
            sunLight.shadow.mapSize.height = 1024;
            
            const d = 150;
            sunLight.shadow.camera.left = -d;
            sunLight.shadow.camera.right = d;
            sunLight.shadow.camera.top = d;
            sunLight.shadow.camera.bottom = -d;
            scene.add(sunLight);

            setupControls();
            window.addEventListener('resize', onWindowResize);

            // Läuft über deinen gltfLoader-Ansatz, sichert die Daten aber im Cache
            preloadModel('baum.glb', () => {
                ui.loadingScreen.style.opacity = 0;
                setTimeout(() => ui.loadingScreen.style.display = 'none', 500);
                
                updateChunks();
                fpsLastTime = performance.now();
                animate();
            });
        }

        // ==========================================
        // MODELPRELOADER (Dein Ansatz, geschützt vor Daten-Spam)
        // ==========================================
        function preloadModel(url, onLoaded) {
            gltfLoader.load(url, (gltf) => {
                const obj = gltf.scene;
                obj.traverse(child => {
                    if (child.isMesh) {
                        child.castShadow = true;
                        child.receiveShadow = true;
                    }
                });
                modelCache[url] = obj;
                onLoaded();
            }, undefined, (error) => {
                console.warn(`Modell '${url}' fehlt. Generiere prozeduralen Ersatz-Baum.`);
                modelCache[url] = createProceduralTreeFallback();
                onLoaded();
            });
        }

        function createProceduralTreeFallback() {
            const treeGroup = new THREE.Group();
            const trunkGeo = new THREE.CylinderGeometry(0.2, 0.4, 3, 5);
            const trunkMat = new THREE.MeshStandardMaterial({ color: 0x5c4033 });
            const trunk = new THREE.Mesh(trunkGeo, trunkMat);
            trunk.position.y = 1.5;
            treeGroup.add(trunk);

            const leavesGeo = new THREE.ConeGeometry(1.5, 4, 5);
            const leavesMat = new THREE.MeshStandardMaterial({ color: 0x2e8b57 });
            const leaves = new THREE.Mesh(leavesGeo, leavesMat);
            leaves.position.y = 4;
            treeGroup.add(leaves);

            return treeGroup;
        }
        // ==========================================
        // DEINE FUNKTION (Nutzt jetzt schnelles RAM-Klonen)
        // ==========================================
        function addModel(url, x, y, z, scale = 1, targetGroup) {
            const master = modelCache[url];
            if (!master) return;

            const obj = master.clone(true);
            obj.scale.set(scale, scale, scale);
            obj.position.set(x, y, z);

            collidables.push(obj);
            targetGroup.add(obj);
        }

        // ==========================================
        // CHUNK MANAGEMENT SYSTEM
        // ==========================================
        function updateChunks() {
            const cx = Math.floor(camera.position.x / CHUNK_SIZE);
            const cz = Math.floor(camera.position.z / CHUNK_SIZE);

            if (cx !== currentChunkX || cz !== currentChunkZ) {
                currentChunkX = cx;
                currentChunkZ = cz;

                const visibleChunkKeys = new Set();

                for (let xOffset = -RENDER_DISTANCE; xOffset <= RENDER_DISTANCE; xOffset++) {
                    for (let zOffset = -RENDER_DISTANCE; zOffset <= RENDER_DISTANCE; zOffset++) {
                        const targetX = currentChunkX + xOffset;
                        const targetZ = currentChunkZ + zOffset;
                        
                        const chunkMinX = targetX * CHUNK_SIZE;
                        const chunkMinZ = targetZ * CHUNK_SIZE;
                        if (chunkMinX < -HALF_WORLD_SIZE || chunkMinX >= HALF_WORLD_SIZE ||
                            chunkMinZ < -HALF_WORLD_SIZE || chunkMinZ >= HALF_WORLD_SIZE) {
                            continue; 
                        }

                        const chunkKey = `${targetX},${targetZ}`;
                        visibleChunkKeys.add(chunkKey);

                        if (!loadedChunks.has(chunkKey)) {
                            buildChunk(targetX, targetZ, chunkKey);
                        }
                    }
                }

                // Unwichtige Chunks entladen und aus collidables löschen
                for (const [key, chunkGroup] of loadedChunks.entries()) {
                    if (!visibleChunkKeys.has(key)) {
                        scene.remove(chunkGroup);
                        
                        collidables = collidables.filter(item => !chunkGroup.children.includes(item));

                        chunkGroup.traverse(object => {
                            if (object.isMesh) {
                                if (object.geometry && object.parent.name === "boden") {
                                    object.geometry.dispose();
                                }
                                if (object.material) {
                                    if (Array.isArray(object.material)) {
                                        object.material.forEach(mat => mat.dispose());
                                    } else {
                                        object.material.dispose();
                                    }
                                }
                            }
                        });
                        loadedChunks.delete(key);
                    }
                }
                ui.loadedChunks.innerText = loadedChunks.size;
            }
        }

        function buildChunk(cx, cz, key) {
            const chunkGroup = new THREE.Group();
            chunkGroup.position.set(cx * CHUNK_SIZE, 0, cz * CHUNK_SIZE);

            const floorGeo = new THREE.PlaneGeometry(CHUNK_SIZE, CHUNK_SIZE);
            const floorMat = new THREE.MeshStandardMaterial({ color: 0x3b7a57, roughness: 0.9 });
            const floor = new THREE.Mesh(floorGeo, floorMat);
            floor.name = "boden";
            floor.rotation.x = -Math.PI / 2;
            floor.position.set(CHUNK_SIZE / 2, 0, CHUNK_SIZE / 2);
            floor.receiveShadow = true;
            chunkGroup.add(floor);

            if (!chunkSeeds.has(key)) {
                chunkSeeds.set(key, Math.random());
            }
            const seed = chunkSeeds.get(key);
            let pseudoRandom = seed;
            function random() {
                let x = Math.sin(pseudoRandom++) * 10000;
                return x - Math.floor(x);
            }

            const treeCount = 8; 
            for (let i = 0; i < treeCount; i++) {
                const localX = Math.max(2, Math.min(CHUNK_SIZE - 2, random() * CHUNK_SIZE));
                const localZ = Math.max(2, Math.min(CHUNK_SIZE - 2, random() * CHUNK_SIZE));
                const scale = 0.8 + random() * 0.5;

                addModel('baum.glb', localX, 0, localZ, scale, chunkGroup);
            }

            scene.add(chunkGroup);
            loadedChunks.set(key, chunkGroup);
        }

        // ==========================================
        // STEUERUNG (Pointer Lock)
        // ==========================================
        function setupControls() {
            ui.blocker.addEventListener('click', () => {
                document.body.requestPointerLock();
            });

            document.addEventListener('pointerlockchange', () => {
                ui.blocker.style.display = (document.pointerLockElement === document.body) ? 'none' : 'flex';
            });

            document.addEventListener('mousemove', (e) => {
                if (document.pointerLockElement !== document.body) return;
                const sensitivity = 0.002;
                camera.rotation.y -= e.movementX * sensitivity;
                camera.rotation.x -= e.movementY * sensitivity;
                camera.rotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, camera.rotation.x));
            });

            camera.rotation.order = 'YXZ';

            window.addEventListener('keydown', (e) => handleKey(e.key, true));
            window.addEventListener('keyup', (e) => handleKey(e.key, false));
        }

        function handleKey(key, isDown) {
            switch (key.toLowerCase()) {
                case 'w': keys.w = isDown; break;
                case 'a': keys.a = isDown; break;
                case 's': keys.s = isDown; break;
                case 'd': keys.d = isDown; break;
                case ' ': 
                    if (isDown && player.canJump) {
                        player.velocity.y = player.jumpStrength;
                        player.canJump = false;
                    }
                    break;
            }
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        // ==========================================
        // PHYSIK & BEWEGUNG
        // ==========================================
        function updatePhysics(delta) {
            if (document.pointerLockElement !== document.body) return;

            player.velocity.x -= player.velocity.x * 10.0 * delta;
            player.velocity.z -= player.velocity.z * 10.0 * delta;
            player.velocity.y -= player.g * delta;

            player.direction.z = Number(keys.w) - Number(keys.s);
            player.direction.x = Number(keys.d) - Number(keys.a);
            player.direction.normalize(); 

            const camDirection = new THREE.Vector3();
            camera.getWorldDirection(camDirection);
            
            const forward = new THREE.Vector3(camDirection.x, 0, camDirection.z).normalize();
            const right = new THREE.Vector3().crossVectors(forward, camera.up).normalize();

            if (keys.w || keys.s) player.velocity.z += player.direction.z * player.speed * delta;
            if (keys.a || keys.d) player.velocity.x += player.direction.x * player.speed * delta;

            const moveX = (forward.x * player.velocity.z + right.x * player.velocity.x) * 10 * delta;
            const moveZ = (forward.z * player.velocity.z + right.z * player.velocity.x) * 10 * delta;
            
            camera.position.x += moveX;
            camera.position.z += moveZ;
            camera.position.y += player.velocity.y * delta;

            if (camera.position.x < -HALF_WORLD_SIZE) camera.position.x = -HALF_WORLD_SIZE;
            if (camera.position.x > HALF_WORLD_SIZE) camera.position.x = HALF_WORLD_SIZE;
            if (camera.position.z < -HALF_WORLD_SIZE) camera.position.z = -HALF_WORLD_SIZE;
            if (camera.position.z > HALF_WORLD_SIZE) camera.position.z = HALF_WORLD_SIZE;

            if (camera.position.y < player.height) {
                player.velocity.y = 0;
                camera.position.y = player.height;
                player.canJump = true;
            }
        }

        // ==========================================
        // ENGINE MAIN LOOP
        // ==========================================
        function animate() {
            requestAnimationFrame(animate);
            const delta = Math.min(clock.getDelta(), 0.1); 

            updatePhysics(delta);
            updateChunks();
            renderer.render(scene, camera);
            updateUI();
        }

        function updateUI() {
            ui.posX.innerText = camera.position.x.toFixed(1);
            ui.posY.innerText = camera.position.y.toFixed(1);
            ui.posZ.innerText = camera.position.z.toFixed(1);
            ui.chunk.innerText = `${currentChunkX},${currentChunkZ}`;

            fpsFrameCount++;
            const time = performance.now();
            if (time >= fpsLastTime + 1000) {
                ui.fps.innerText = Math.round((fpsFrameCount * 1000) / (time - fpsLastTime));
                fpsFrameCount = 0;
                fpsLastTime = time;
            }
        }

        window.onload = init;
    </script>
</body>
</html>
