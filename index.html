<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Infinite Chunk World</title>

<style>
body { margin:0; overflow:hidden; }
#info {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-family:Arial;
  font-size:14px;
}
</style>
</head>

<body>
<div id="info">WASD + SPACE | Infinite Chunks</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.161/build/three.min.js"></script>

<script>
// ================= SCENE =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.y = 10;

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1));

// ================= INPUT =================
const keys = {};
addEventListener("keydown", e => keys[e.code]=true);
addEventListener("keyup", e => keys[e.code]=false);

// ================= PHYSICS =================
let velY = 0;
let canJump = false;

// ================= TERRAIN NOISE =================
function noise(x,z){
  return (Math.sin(x*0.08)+Math.cos(z*0.08))*2;
}

// ================= CHUNKS =================
const chunkSize = 50;
const chunks = new Map();

function makeTree(x,z,group){
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.3,0.5,3),
    new THREE.MeshStandardMaterial({ color:0x8b5a2b })
  );
  trunk.position.set(x,2,z);

  const leaves = new THREE.Mesh(
    new THREE.SphereGeometry(1.5,8,8),
    new THREE.MeshStandardMaterial({ color:0x0a7a2f })
  );
  leaves.position.set(x,4,z);

  group.add(trunk);
  group.add(leaves);
}

function createChunk(cx, cz){
  const key = cx + "," + cz;
  if(chunks.has(key)) return;

  const group = new THREE.Group();

  // ---- GROUND ----
  const geo = new THREE.PlaneGeometry(chunkSize, chunkSize, 10, 10);
  geo.rotateX(-Math.PI/2);

  const pos = geo.attributes.position;

  for(let i=0;i<pos.count;i++){
    const x = pos.getX(i) + cx*chunkSize;
    const z = pos.getZ(i) + cz*chunkSize;
    pos.setY(i, noise(x,z));
  }

  geo.computeVertexNormals();

  const ground = new THREE.Mesh(
    geo,
    new THREE.MeshStandardMaterial({ color:0x228b22 })
  );

  group.add(ground);

  // ---- TREES ----
  for(let i=0;i<6;i++){
    const x = cx*chunkSize + (Math.random()-0.5)*chunkSize;
    const z = cz*chunkSize + (Math.random()-0.5)*chunkSize;
    const y = noise(x,z);

    makeTree(x,y,z,group);
  }

  scene.add(group);
  chunks.set(key, group);
}

// ================= UPDATE CHUNKS =================
function updateChunks(){
  const cx = Math.floor(camera.position.x / chunkSize);
  const cz = Math.floor(camera.position.z / chunkSize);

  for(let x=-1; x<=1; x++){
    for(let z=-1; z<=1; z++){
      createChunk(cx+x, cz+z);
    }
  }
}

// ================= LOOP =================
function animate(){
  requestAnimationFrame(animate);

  updateChunks();

  const speed = 0.3;

  if(keys["KeyW"]) camera.position.z -= speed;
  if(keys["KeyS"]) camera.position.z += speed;
  if(keys["KeyA"]) camera.position.x -= speed;
  if(keys["KeyD"]) camera.position.x += speed;

  // gravity
  velY -= 0.02;
  camera.position.y += velY;

  const groundY = noise(camera.position.x, camera.position.z) + 4;

  if(camera.position.y < groundY){
    camera.position.y = groundY;
    velY = 0;
    canJump = true;
  }

  if(keys["Space"] && canJump){
    velY = 0.4;
    canJump = false;
  }

  renderer.render(scene,camera);
}

animate();

// ================= RESIZE =================
addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
