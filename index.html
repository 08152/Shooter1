<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FPS World FIX</title>
<style>
body { margin:0; overflow:hidden; }
#info {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-family:Arial;
}
</style>
</head>
<body>

<div id="info">CLICK + WASD + SPACE</div>

<!-- ✅ THREE.JS (NON-MODULE, STABIL) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.161/build/three.min.js"></script>

<script>
// ---------- BASIC ----------
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.y = 5;

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ---------- LIGHT ----------
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1));

// ---------- SIMPLE CONTROLS (NO POINTERLOCK FOR STABILITY) ----------
const keys = {};
addEventListener("keydown", e => keys[e.code]=true);
addEventListener("keyup", e => keys[e.code]=false);

// click to start movement lock
let active = false;
document.body.addEventListener("click", ()=> active = true);

// ---------- NOISE TERRAIN ----------
function noise(x,z){
  return (Math.sin(x*0.05)+Math.cos(z*0.05))*2;
}

// ---------- GROUND ----------
const geo = new THREE.PlaneGeometry(500,500,50,50);
geo.rotateX(-Math.PI/2);

const pos = geo.attributes.position;
for(let i=0;i<pos.count;i++){
  const x = pos.getX(i);
  const z = pos.getZ(i);
  pos.setY(i, noise(x,z));
}
geo.computeVertexNormals();

const ground = new THREE.Mesh(
  geo,
  new THREE.MeshStandardMaterial({color:0x228b22})
);

scene.add(ground);

// ---------- TREES ----------
function tree(x,z){
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.3,0.5,3),
    new THREE.MeshStandardMaterial({color:0x8b5a2b})
  );
  trunk.position.set(x,2,z);

  const leaves = new THREE.Mesh(
    new THREE.SphereGeometry(1.5,8,8),
    new THREE.MeshStandardMaterial({color:0x0a7a2f})
  );
  leaves.position.set(x,4,z);

  scene.add(trunk);
  scene.add(leaves);
}

for(let i=0;i<150;i++){
  tree(
    (Math.random()-0.5)*200,
    (Math.random()-0.5)*200
  );
}

// ---------- PLAYER PHYSICS ----------
let velY = 0;
let canJump = false;

// ---------- LOOP ----------
function animate(){
  requestAnimationFrame(animate);

  if(active){
    const speed = 0.4;

    if(keys["KeyW"]) camera.position.z -= speed;
    if(keys["KeyS"]) camera.position.z += speed;
    if(keys["KeyA"]) camera.position.x -= speed;
    if(keys["KeyD"]) camera.position.x += speed;
  }

  // gravity
  velY -= 0.02;
  camera.position.y += velY;

  const g = noise(camera.position.x, camera.position.z) + 3;

  if(camera.position.y < g){
    camera.position.y = g;
    velY = 0;
    canJump = true;
  }

  if(keys["Space"] && canJump){
    velY = 0.4;
    canJump = false;
  }

  renderer.render(scene, camera);
}

animate();

// resize
addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
