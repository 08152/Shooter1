<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>10k Chunk World with Physics</title>

<style>
body { margin:0; overflow:hidden; background-color: #87cfff; }
#hud {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-family:Arial, sans-serif;
  background:rgba(0,0,0,0.6);
  padding:10px;
  border-radius: 4px;
  user-select: none;
  pointer-events: none;
}
#crosshair {
  position: absolute;
  top: 50%;
  left: 50%;
  width: 10px;
  height: 10px;
  background: white;
  border-radius: 50%;
  transform: translate(-50%, -50%);
  pointer-events: none;
}
#instructions {
  position: absolute;
  width: 100%;
  height: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.5);
  color: white;
  font-family: Arial;
  font-size: 24px;
  cursor: pointer;
}
</style>
</head>
<body>

<div id="instructions">Klicken zum Spielen (WASD = Bewegen, Maus = Umsehen, Space = Springen)</div>
<div id="crosshair"></div>
<div id="hud">10K WORLD | CHUNKS: <span id="chunk-count">0</span></div>

<!-- Bibliotheken (Three.js, GLTFLoader & PointerLockControls) -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://jsdelivr.net"></script>

<script>
// ================= CONFIGURATION =================
const WORLD_SIZE = 10000;
const chunkSize = 100;
const renderDistance = 3; // Erhöht für besseren Nebel-Übergang

// Physik-Parameter
const GRAVITY = 30.0;
const JUMP_FORCE = 12.0;
const PLAYER_SPEED = 40.0;
const PLAYER_HEIGHT = 3.0;

// Variablen für Bewegung
let velocity = new THREE.Vector3();
let direction = new THREE.Vector3();
let moveForward = false;
let moveBackward = false;
let moveLeft = false;
let moveRight = false;
let canJump = false;
let prevTime = performance.now();

// ================= SCENE SETUP =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87cfff);
scene.fog = new THREE.FogExp2(0x87cfff, 0.007); // Exponentieller Nebel für weicheren Übergang

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.y = PLAYER_HEIGHT;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

// Beleuchtung
const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(200, 400, 200);
scene.add(dirLight);

// ================= POINTER LOCK CONTROLS =================
const controls = new THREE.PointerLockControls(camera, document.body);
const instructions = document.getElementById('instructions');

instructions.addEventListener('click', () => {
  controls.lock();
});

controls.addEventListener('lock', () => {
  instructions.style.display = 'none';
});

controls.addEventListener('unlock', () => {
  instructions.style.display = 'flex';
});

scene.add(controls.getObject());

// ================= INPUT SYSTEM =================
const onKeyDown = function (event) {
  switch (event.code) {
    case 'KeyW': moveForward = true; break;
    case 'KeyA': moveLeft = true; break;
    case 'KeyS': moveBackward = true; break;
    case 'KeyD': moveRight = true; break;
    case 'Space':
      if (canJump === true) velocity.y += JUMP_FORCE;
      canJump = false;
      break;
  }
};

const onKeyUp = function (event) {
  switch (event.code) {
    case 'KeyW': moveForward = false; break;
    case 'KeyA': moveLeft = false; break;
    case 'KeyS': moveBackward = false; break;
    case 'KeyD': moveRight = false; break;
  }
};

document.addEventListener('keydown', onKeyDown);
document.addEventListener('keyup', onKeyUp);

// ================= TEXTURE LOADING =================
const textureLoader = new THREE.TextureLoader();
// Nutzen eines zuverlässigen CORS-erlaubten Textur-Pfads
const tex = textureLoader.load("https://threejs.org/examples/textures/terrain/grasslight-big.jpg", (t) => {
  t.wrapS = THREE.RepeatWrapping;
  t.wrapT = THREE.RepeatWrapping;
});

// ================= GLB MODEL LOADING =================
const loader = new THREE.GLTFLoader();
let treeModel = null;
const pendingChunks = []; // Warteliste für Chunks, die vor dem Modell geladen wurden

loader.load("./baum.glb", 
  (gltf) => {
    treeModel = gltf.scene;
    // Sobald das Modell da ist, alle wartenden Chunks mit Bäumen füllen
    pendingChunks.forEach(chunkData => {
      populateTrees(chunkData.group, chunkData.cx, chunkData.cz);
    });
    pendingChunks.length = 0;
  },
  undefined,
  (error) => {
    console.warn("Fehler beim Laden von ./baum.glb. Erstelle Ersatz-Bäume.");
    // Fallback: Wenn keine Datei da ist, bauen wir einen einfachen Dummy-Baum
    treeModel = new THREE.Group();
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.4, 0.6, 3), new THREE.MeshStandardMaterial({color: 0x5c4033}));
    trunk.position.y = 1.5;
    const leaves = new THREE.Mesh(new THREE.SphereGeometry(2), new THREE.MeshStandardMaterial({color: 0x2e8b57}));
    leaves.position.y = 3.5;
    treeModel.add(trunk, leaves);
  }
);

// ================= DEINE BAUM-KOORDINATEN =================
const treeCoords = [
  {x: 10, z: -10},
  {x: 100, z: 100},
  {x: -300, z: 200},
  {x: 500, z: -400},
  {x: 25, z: 40},
  {x: -15, z: -80}
];

// ================= CHUNK GENERATION =================
const chunks = new Map();
const chunkGeometry = new THREE.PlaneGeometry(chunkSize, chunkSize);

function createChunk(cx, cz) {
  const key = `${cx},${cz}`;
  if (chunks.has(key)) return;

  // Weltgrenzen-Check (10k Limit)
  const maxChunkCoord = WORLD_SIZE / 2 / chunkSize;
  if (Math.abs(cx) >= maxChunkCoord || Math.abs(cz) >= maxChunkCoord) return;

  const group = new THREE.Group();
  group.position.set(cx * chunkSize, 0, cz * cz * 0); // Platzierung erfolgt über Gruppen-Position

  // Lokales Material für korrekte Textur-Verschiebung erzeugen
  const chunkMaterial = new THREE.MeshStandardMaterial({ 
    map: tex.clone(),
    roughness: 0.8
  });
  
  // Textur nahtlos aneinanderfügen (Kachelung berechnen)
  chunkMaterial.map.repeat.set(4, 4);
  chunkMaterial.map.needsUpdate = true;

  const ground = new THREE.Mesh(chunkGeometry, chunkMaterial);
  ground.rotation.x = -Math.PI / 2;
  // Positionierung innerhalb der Gruppe (Zentriert)
  ground.position.set(chunkSize/2, 0, chunkSize/2);
  group.add(ground);

  // Bäume platzieren oder auf Warteliste setzen
  if (treeModel) {
    populateTrees(group, cx, cz);
  } else {
    pendingChunks.push({ group, cx, cz });
  }

  scene.add(group);
  chunks.set(key, group);
}

// Bäume in den passenden Chunk setzen
function populateTrees(group, cx, cz) {
  const minX = cx * chunkSize;
  const maxX = minX + chunkSize;
  const minZ = cz * chunkSize;
  const maxZ = minZ + chunkSize;

  for (const t of treeCoords) {
    // Prüfen, ob der Baum mathematisch in diesem Chunk liegt
    if (t.x >= minX && t.x < maxX && t.z >= minZ && t.z < maxZ) {
      const tClone = treeModel.clone();
      // Position relativ zur lokalen Chunk-Gruppe setzen
      tClone.position.set(t.x - minX, 0, t.z - minZ);
      group.add(tClone);
    }
  }
}

// ================= CLEANUP OOR CHUNKS =================
function cleanupChunks(cx, cz) {
  for (const [key, chunk] of chunks) {
    const [x, z] = key.split(",").map(Number);

    if (Math.abs(x - cx) > renderDistance || Math.abs(z - cz) > renderDistance) {
      scene.remove(chunk);
      // Geometrien und Materialien im Speicher freigeben
      chunk.traverse(node => {
        if (node.isMesh) {
          if(node.geometry) node.geometry.dispose();
          if(node.material) {
            if(Array.isArray(node.material)) node.material.forEach(m => m.dispose());
            else node.material.dispose();
          }
        }
      });
      chunks.delete(key);
    }
  }
  document.getElementById('chunk-count').innerText = chunks.size;
}

// Chunks im Sichtfeld updaten
function updateChunks() {
  const playerPos = controls.getObject().position;
  const cx = Math.floor(playerPos.x / chunkSize);
  const cz = Math.floor(playerPos.z / chunkSize);

  for (let x = -renderDistance; x <= renderDistance; x++) {
    for (let z = -renderDistance; z <= renderDistance; z++) {
      createChunk(cx + x, cz + z);
    }
  }
  cleanupChunks(cx, cz);
}

// ================= GAME LOOP & PHYSICS =================
function animate() {
  requestAnimationFrame(animate);

  const time = performance.now();

  if (controls.isLocked === true) {
    const delta = (time - prevTime) / 1000;

    // Reibung / Dämpfung der Bewegung
    velocity.x -= velocity.x * 10.0 * delta;
    velocity.z -= velocity.z * 10.0 * delta;

    // Schwerkraft anwenden
    velocity.y -= GRAVITY * delta;

    direction.z = Number(moveForward) - Number(moveBackward);
    direction.x = Number(moveRight) - Number(moveLeft);
    direction.normalize();

    // Bewegung relativ zur Blickrichtung berechnen
    if (moveForward || moveBackward) velocity.z -= direction.z * PLAYER_SPEED * delta;
    if (moveLeft || moveRight) velocity.x -= direction.x * PLAYER_SPEED * delta;

    controls.moveRight(-velocity.x * delta);
    controls.moveForward(-velocity.z * delta);

    // Schwerkraft-Kollision mit dem Boden (Y = PLAYER_HEIGHT)
    controls.getObject().position.y += velocity.y * delta;

    if (controls.getObject().position.y < PLAYER_HEIGHT) {
      velocity.y = 0;
      controls.getObject().position.y = PLAYER_HEIGHT;
      canJump = true;
    }
    
    // Weltgrenzen-Kollision (10k Barriere)
    const pos = controls.getObject().position;
    const limit = WORLD_SIZE / 2;
    if (pos.x > limit) pos.x = limit;
    if (pos.x < -limit) pos.x = -limit;
    if (pos.z > limit) pos.z = limit;
    if (pos.z < -limit) pos.z = -limit;updateChunks();}
    prevTime = time;renderer.render(scene, camera);}
    // Start der AnwendungupdateChunks();animate();//
    Resizing
    window.addEventListener("resize", () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix()
    ;renderer.setSize(window.innerWidth, window.innerHeight);});
