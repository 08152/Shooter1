<style>

  display: flex;

  padding: 20px 40px;

<button onclick="openEditor()">Editor</button>

<script>
function openEditor(){
  const code = prompt("Gib Editor Code ein:");

  if(code === "error422"){

  } else {
    alert("Falscher Code!");
  }
}
</script>
