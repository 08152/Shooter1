<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FPS GLB WORLD</title>

<style>
body { margin:0; overflow:hidden; background:#87cfff; }

#hud{
  position:absolute;
  bottom:10px;
  left:10px;
  color:white;
  font-family:Arial;
  background:rgba(0,0,0,0.4);
  padding:6px;
}
</style>
</head>
<body>

<div id="hud">CLICK TO PLAY (WASD + SPACE)</div>

<!-- THREE + LOADER -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

// ================= SCENE =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87cfff);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 5000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1));

// ================= INPUT =================
const keys = {};
addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

// ================= PLAYER =================
let velY = 0;
let onGround = true;

// ================= GLB SYSTEM (CACHE) =================
const loader = new THREE.GLTFLoader();

let treeModel = null;
let ready = false;
let queue = [];

// LOAD ONCE
loader.load("./baum.glb",

(gltf)=>{
  treeModel = gltf.scene;
  ready = true;

  console.log("✅ Baum geladen");

  // queued trees spawn
  queue.forEach(t=>{
    spawnTree(t.x,t.y,t.z);
  });

  queue = [];
},

undefined,

(err)=>{
  console.error("❌ GLB ERROR:", err);
});

// ================= SPAWN TREE (NO RELOAD) =================
function spawnTree(x,y,z){

if(!ready){
queue.push({x,y,z});
return;
}

const tree = treeModel.clone(); // 🔥 CACHE COPY

tree.position.set(x,y,z);
tree.scale.set(1,1,1);

scene.add(tree);
}

// ================= WORLD =================
for(let i=0;i<200;i++){
spawnTree(
(Math.random()-0.5)*200,
-1,
(Math.random()-0.5)*200
);
}

// ================= MOVE =================
function move(){
const speed = 0.25;

if(keys["w"]) camera.position.z -= speed;
if(keys["s"]) camera.position.z += speed;
if(keys["a"]) camera.position.x -= speed;
if(keys["d"]) camera.position.x += speed;
}

// ================= GRAVITY =================
function gravity(){
velY -= 0.02;
camera.position.y += velY;

if(camera.position.y < 2){
camera.position.y = 2;
velY = 0;
onGround = true;
}
}

addEventListener("keydown",(e)=>{
if(e.code==="Space" && onGround){
velY = 0.35;
onGround = false;
}
});

// ================= CLICK START =================
document.body.addEventListener("click",()=>{
document.body.requestPointerLock();
});

// ================= LOOP =================
function animate(){
requestAnimationFrame(animate);

move();
gravity();

renderer.render(scene,camera);
}

animate();

// RESIZE
addEventListener("resize",()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth, innerHeight);
});

</script>
</body>
</html>
