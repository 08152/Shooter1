<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>CHUNK FOG WORLD</title>

<style>
body { margin:0; overflow:hidden; }
#hud{
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-family:Arial;
  background:rgba(0,0,0,0.4);
  padding:6px;
}
</style>
</head>
<body>

<div id="hud">CHUNK WORLD + FOG + COORD TREES</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

// ================= SCENE =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87cfff);

// 🌫️ NEBEL (WICHTIG!)
scene.fog = new THREE.Fog(0x87cfff, 20, 120);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 2000);
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1));

// ================= INPUT =================
const keys = {};
addEventListener("keydown",e=>keys[e.key.toLowerCase()]=true);
addEventListener("keyup",e=>keys[e.key.toLowerCase()]=false);

// ================= GLB =================
const loader = new THREE.GLTFLoader();
let treeModel = null;

loader.load("./baum.glb",(gltf)=>{
treeModel = gltf.scene;
});

// ================= CHUNKS =================
const chunkSize = 50;
const chunks = new Map();

function createChunk(cx, cz){

const key = cx+","+cz;
if(chunks.has(key)) return;

const group = new THREE.Group();

// ground
const ground = new THREE.Mesh(
new THREE.PlaneGeometry(chunkSize,chunkSize),
new THREE.MeshStandardMaterial({color:0x228b22})
);
ground.rotation.x = -Math.PI/2;
group.add(ground);

// load trees for THIS chunk
loadTreesForChunk(group, cx, cz);

scene.add(group);
chunks.set(key, group);
}

// ================= TREE COORDINATE SYSTEM =================

// 👉 HIER KOMMEN DEINE BÄUME REIN
const treeCoords = [
{ x: 10, z: 10 },
{ x: 15, z: -20 },
{ x: -5, z: 30 },
{ x: 0, z: 0 }
];

// ================= TREE SPAWNER =================
function loadTreesForChunk(group, cx, cz){

if(!treeModel) return;

for(const t of treeCoords){

// nur Bäume im aktuellen Chunk anzeigen
const inChunkX = Math.floor(t.x / chunkSize) === cx;
const inChunkZ = Math.floor(t.z / chunkSize) === cz;

if(inChunkX && inChunkZ){

const tree = treeModel.clone();

tree.position.set(t.x, 0, t.z);
tree.scale.set(1,1,1);

group.add(tree);
}

}
}

// ================= CHUNK UPDATE =================
function updateChunks(){

const cx = Math.floor(camera.position.x / chunkSize);
const cz = Math.floor(camera.position.z / chunkSize);

// nur aktueller Chunk + Umgebung
for(let x=-1;x<=1;x++){
for(let z=-1;z<=1;z++){
createChunk(cx+x, cz+z);
}
}

}

// ================= MOVE =================
function move(){

const speed = 0.3;

if(keys["w"]) camera.position.z -= speed;
if(keys["s"]) camera.position.z += speed;
if(keys["a"]) camera.position.x -= speed;
if(keys["d"]) camera.position.x += speed;

}

// ================= LOOP =================
function animate(){
requestAnimationFrame(animate);

move();
updateChunks();

renderer.render(scene,camera);
}

animate();

addEventListener("resize",()=>{
camera.aspect=innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth,innerHeight);
});

</script>
</body>
</html>
