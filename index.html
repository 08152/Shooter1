<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<title>FPS Infinite World - Fixed GLB</title>

<style>
body { margin:0; overflow:hidden; background:#87ceeb; user-select: none; }
#hud {
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-family:Arial, sans-serif;
  font-size:14px;
  background:rgba(0,0,0,0.5);
  padding:12px;
  border-radius:8px;
  z-index: 10;
  pointer-events: none;
}
#center {
  position:absolute;
  top:50%;
  left:50%;
  width:6px;
  height:6px;
  background:white;
  transform:translate(-50%,-50%);
  border-radius:50%;
  z-index: 10;
  pointer-events: none;
}
#instructions {
  position: absolute;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
  color: white;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  z-index: 20;
  cursor: pointer;
}
</style>

<!-- Garantiert stabile Bibliotheken, die ohne Webserver zusammenarbeiten -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://jsdelivr.net"></script>

</head>

<body>
<div id="instructions">
  <h2>Klicken zum Spielen</h2>
  <p>W, A, S, D = Bewegen | Leertaste = Springen | Maus = Umschauen</p>
</div>
<div id="hud">Initialisiere Welt...</div>
<div id="center"></div>

<script>
const instructions = document.getElementById("instructions");
const hud = document.getElementById("hud");

/* -------------------- BASIC SETUP -------------------- */
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);
scene.fog = new THREE.FogExp2(0x87ceeb, 0.015);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 10, 0);
camera.rotation.order = 'YXZ'; 

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

/* BELEUCHTUNG */
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight = new THREE.DirectionalLight(0xffffff, 0.8);
dirLight.position.set(20, 40, 20);
scene.add(dirLight);

/* -------------------- STEUERUNG -------------------- */
const keys = {};
let rotX = 0, rotY = 0;

document.addEventListener("keydown", e => keys[e.code] = true);
document.addEventListener("keyup", e => keys[e.code] = false);

instructions.addEventListener("click", () => {
  document.body.requestPointerLock();
});

document.addEventListener("pointerlockchange", () => {
  if (document.pointerLockElement === document.body) {
    instructions.style.display = "none";
  } else {
    instructions.style.display = "flex";
  }
});

document.addEventListener("mousemove", e => {
  if (document.pointerLockElement === document.body) {
    rotY -= e.movementX * 0.0025;
    rotX -= e.movementY * 0.0025;
    rotX = Math.max(-1.4, Math.min(1.4, rotX));
  }
});

/* -------------------- WELT-GENERIERUNG -------------------- */
const chunks = {};
const CHUNK_SIZE = 50;
const RENDER_DISTANCE = 2;

function getHeight(x, z) {
  return (
    Math.sin(x * 0.04) * 2.5 +
    Math.cos(z * 0.04) * 2.5 +
    Math.sin((x + z) * 0.01) * 4
  );
}

function createGround(x, z) {
  const geo = new THREE.PlaneGeometry(CHUNK_SIZE, CHUNK_SIZE, 12, 12);
  const pos = geo.attributes.position;

  for (let i = 0; i < pos.count; i++) {
    const vx = pos.getX(i) + x;
    const vy = pos.getY(i) + z;
    const vz = getHeight(vx, vy);
    pos.setZ(i, vz);
  }

  geo.computeVertexNormals();
  const mat = new THREE.MeshLambertMaterial({ color: 0x2ecc71, flatShading: true });
  const mesh = new THREE.Mesh(geo, mat);

  mesh.rotation.x = -Math.PI / 2;
  mesh.position.set(x, 0, z);
  return mesh;
}

/* -------------------- GLB LOADER FIX -------------------- */
let treeModel = null;

// KORREKTUR: "new GLTFLoader()" statt "new THREE.GLTFLoader()" bei Script-Tags
const loader = new GLTFLoader(); 
loader.load(
  "./baum.glb", 
  glb => {
    treeModel = glb.scene;
    initGame();
  }, 
  undefined, 
  error => {
    console.error("Fehler beim Laden von baum.glb! Stelle sicher, dass die Datei im gleichen Ordner liegt und ein lokaler Webserver aktiv ist.", error);
    initGame(); 
  }
);

/* -------------------- CHUNK LOGIK -------------------- */
function createChunk(cx, cz) {
  const key = cx + "," + cz;
  if (chunks[key]) return;

  const group = new THREE.Group();
  const worldX = cx * CHUNK_SIZE;
  const worldZ = cz * CHUNK_SIZE;

  group.add(createGround(worldX, worldZ));

  if (treeModel) {
    for (let i = 0; i < 5; i++) {
      const x = worldX + (Math.random() - 0.5) * (CHUNK_SIZE - 4);
      const z = worldZ + (Math.random() - 0.5) * (CHUNK_SIZE - 4);
      const y = getHeight(x, z);

      const tree = treeModel.clone();
      tree.position.set(x, y, z);
      
      const scale = 1.5 + Math.random() * 1.0;
      tree.scale.set(scale, scale, scale);
      group.add(tree);
    }
  }

  scene.add(group);
  chunks[key] = group;
}

function updateChunks(px, pz) {
  const cx = Math.floor((px + CHUNK_SIZE / 2) / CHUNK_SIZE);
  const cz = Math.floor((pz + CHUNK_SIZE / 2) / CHUNK_SIZE);

  for (let x = -RENDER_DISTANCE; x <= RENDER_DISTANCE; x++) {
    for (let z = -RENDER_DISTANCE; z <= RENDER_DISTANCE; z++) {
      createChunk(cx + x, cz + z);
    }
  }
}

/* -------------------- GAME LOOP -------------------- */
let velocityY = 0;
let canJump = false;
let fps = 0, frames = 0, lastTime = performance.now();

function initGame() {
  updateChunks(camera.position.x, camera.position.z);
  animate();
}

function animate() {
  requestAnimationFrame(animate);

  const now = performance.now();
  frames++;
  if (now - lastTime >= 1000) {
    fps = frames;
    frames = 0;
    lastTime = now;
  }

  camera.rotation.set(rotX, rotY, 0);

  const speed = 0.25;
  if (keys["KeyW"]) camera.translateZ(-speed);
  if (keys["KeyS"]) camera.translateZ(speed);
  if (keys["KeyA"]) camera.translateX(-speed);
  if (keys["KeyD"]) camera.translateX(speed);

  const groundY = getHeight(camera.position.x, camera.position.z) + 2;

  velocityY -= 0.008;
  camera.position.y += velocityY;

  if (camera.position.y < groundY) {
    camera.position.y = groundY;
    velocityY = 0;
    canJump = true;
  }

  if (keys["Space"] && canJump) {
    velocityY = 0.22;
    canJump = false;
  }

  updateChunks(camera.position.x, camera.position.z);

  hud.innerHTML =
    `FPS: ${fps}<br>` +
    `X: ${camera.position.x.toFixed(1)}<br>` +
    `Y: ${camera.position.y.toFixed(1)}<br>` +
    `Z: ${camera.position.z.toFixed(1)}`;

  renderer.render(scene, camera);
}

window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
