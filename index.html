<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FPS World</title>

<style>
html,body{
    margin:0;
    overflow:hidden;
    width:100%;
    height:100%;
    background:#87ceeb;
    font-family:Arial,sans-serif;
}

canvas{
    display:block;
}

#crosshair{
    position:absolute;
    left:50%;
    top:50%;
    width:6px;
    height:6px;
    margin-left:-3px;
    margin-top:-3px;
    background:white;
    border-radius:50%;
    pointer-events:none;
}

#coords{
    position:absolute;
    top:10px;
    right:10px;
    color:white;
    background:rgba(0,0,0,.45);
    padding:8px 12px;
    border-radius:6px;
    font-size:16px;
    user-select:none;
}

#info{
    position:absolute;
    inset:0;
    display:flex;
    justify-content:center;
    align-items:center;
    color:white;
    background:rgba(0,0,0,.45);
    font-size:24px;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="info">
Klicken zum Starten
</div>

<div id="coords">
X: 0<br>
Y: 0<br>
Z: 0
</div>

<div id="crosshair"></div>

<script type="importmap">
{
  "imports": {
    "three":"https://unpkg.com/three@0.165.0/build/three.module.js",
    "three/addons/":"https://unpkg.com/three@0.165.0/examples/jsm/"
  }
}
</script>

<script type="module" src="./main.js"></script>

</body>
</html>
