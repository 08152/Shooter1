<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>FULL FPS GLB WORLD</title>

<style>
body { margin:0; overflow:hidden; background:#87cfff; }

#crosshair{
  position:absolute;
  top:50%;
  left:50%;
  width:10px;height:10px;
  transform:translate(-50%,-50%);
  z-index:10;
}
#crosshair:before,#crosshair:after{
  content:"";
  position:absolute;
  background:white;
}
#crosshair:before{width:2px;height:10px;left:4px;}
#crosshair:after{width:10px;height:2px;top:4px;}

#coords{
  position:absolute;
  bottom:10px;
  right:10px;
  color:white;
  font-family:Arial;
  font-size:13px;
  background:rgba(0,0,0,0.4);
  padding:6px;
  border-radius:6px;
  white-space:pre;
}

#healthBar{
  position:absolute;
  bottom:10px;
  left:10px;
  width:220px;
  height:18px;
  border:2px solid white;
  background:rgba(0,0,0,0.3);
}
#healthFill{
  width:100%;
  height:100%;
  background:#1e90ff;
}
</style>
</head>

<body>

<div id="crosshair"></div>
<div id="coords"></div>
<div id="healthBar"><div id="healthFill"></div></div>

<!-- THREE + GLTF LOADER -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>

<script>

// ================= SCENE =================
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87cfff);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 5000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ================= LIGHT =================
scene.add(new THREE.AmbientLight(0xffffff, 1.2));
const sun = new THREE.DirectionalLight(0xffffff, 1.5);
sun.position.set(10,20,10);
scene.add(sun);

// ================= PLAYER =================
const player = new THREE.Object3D();
scene.add(player);
player.add(camera);
camera.position.set(0,2.2,0);

// ================= INPUT =================
const keys = {};
addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// ================= LOOK =================
let yaw = 0, pitch = 0;

document.addEventListener("mousemove",(e)=>{
if(document.pointerLockElement !== document.body) return;

yaw -= e.movementX * 0.002;
pitch -= e.movementY * 0.002;

pitch = Math.max(-1.2, Math.min(1.2, pitch));

player.rotation.y = yaw;
camera.rotation.x = pitch;
});

document.body.addEventListener("click", ()=>document.body.requestPointerLock());

// ================= PHYSICS =================
let velY = 0;
let onGround = true;

// ================= MOVE =================
function move(){
const speed = 0.15;

let dir = new THREE.Vector3();
if(keys["w"]) dir.z -= 1;
if(keys["s"]) dir.z += 1;
if(keys["a"]) dir.x -= 1;
if(keys["d"]) dir.x += 1;

dir.normalize();

const forward = new THREE.Vector3(0,0,-1).applyEuler(player.rotation);
forward.y = 0; forward.normalize();

const right = new THREE.Vector3().crossVectors(forward, new THREE.Vector3(0,1,0)).negate();

player.position.addScaledVector(forward, dir.z * speed);
player.position.addScaledVector(right, dir.x * speed);
}

// ================= GRAVITY =================
function gravity(){
velY -= 0.015;
player.position.y += velY;

if(player.position.y <= 0){
player.position.y = 0;
velY = 0;
onGround = true;
}
}

addEventListener("keydown",(e)=>{
if(e.code === "Space" && onGround){
velY = 0.25;
onGround = false;
}
});

// ================= GLB SYSTEM =================
const gltfLoader = new THREE.GLTFLoader();
let collidables = [];

function addModel(url, x, y, z, scale = 1){

gltfLoader.load(
url,
(gltf)=>{

const obj = gltf.scene;

obj.position.set(x,y,z);
obj.scale.set(scale,scale,scale);

scene.add(obj);

obj.userData.box = new THREE.Box3();
collidables.push(obj);

},
undefined,
(err)=>{
console.error("GLB ERROR:", url, err);
}
);

}

// ================= BAUM.GLB =================
function addTree(x,y,z,scale=1){
addModel("./baum.glb", x,y,z,scale);
}

addTree(-18,-1,-5,1);
addTree(-5,-1,10,1);
addTree(27,-1,-1,1);
addTree(38,-1,-41,1);
addTree(-24,-1,3,1);
addTree(4,-1,-5,1);

// ================= LOOP =================
function animate(){
requestAnimationFrame(animate);

move();
gravity();

camera.position.y += (2.2 + player.position.y - camera.position.y) * 0.15;

document.getElementById("coords").innerText =
`X:${player.position.x.toFixed(2)}
Y:${player.position.y.toFixed(2)}
Z:${player.position.z.toFixed(2)}`;

renderer.render(scene,camera);
}

animate();

// ================= RESIZE =================
addEventListener("resize", ()=>{
camera.aspect = innerWidth/innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(innerWidth, innerHeight);
});

</script>
</body>
</html>
